<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L26 编译器可视化前端</title>
    <style>
        /* ====================================================
           全局样式 — 简洁清晰，对标参考项目风格
        ==================================================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Consolas", "Courier New", monospace;
            font-size: 14px;
            background: #1e1e2e;
            color: #cdd6f4;
            min-height: 100vh;
        }

        header {
            background: #313244;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #45475a;
        }
        header h1 { font-size: 18px; color: #cba6f7; letter-spacing: 1px; }
        header span { font-size: 12px; color: #6c7086; }

        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: auto 1fr 1fr;
            gap: 10px;
            padding: 10px;
            height: calc(100vh - 56px);
        }

        /* 面板 */
        .panel {
            background: #181825;
            border: 1px solid #313244;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-title {
            background: #313244;
            padding: 6px 14px;
            font-size: 12px;
            color: #89b4fa;
            font-weight: bold;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-title .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #89b4fa;
        }
        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* 编辑区 */
        #sourceCode {
            width: 100%;
            height: 100%;
            background: transparent;
            color: #cdd6f4;
            border: none;
            outline: none;
            resize: none;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.6;
            tab-size: 4;
        }

        /* 控制栏 */
        .controls {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            background: #181825;
            border: 1px solid #313244;
            border-radius: 6px;
        }
        .btn {
            padding: 7px 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: bold;
            transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #89b4fa; color: #1e1e2e; }
        .btn-green   { background: #a6e3a1; color: #1e1e2e; }
        .btn-yellow  { background: #f9e2af; color: #1e1e2e; }
        .btn-red     { background: #f38ba8; color: #1e1e2e; }
        .btn-purple  { background: #cba6f7; color: #1e1e2e; }
        .btn-gray    { background: #45475a; color: #cdd6f4; }

        .status-bar {
            flex: 1;
            text-align: right;
            font-size: 12px;
            color: #6c7086;
        }
        #statusMsg { color: #a6e3a1; }
        #statusMsg.error { color: #f38ba8; }

        /* Token 表 */
        .token-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .token-table th {
            background: #313244;
            padding: 4px 8px;
            color: #89b4fa;
            text-align: left;
            position: sticky;
            top: 0;
        }
        .token-table td {
            padding: 3px 8px;
            border-bottom: 1px solid #313244;
        }
        .token-table tr:hover td { background: #313244; }
        .tok-keyword  { color: #cba6f7; }
        .tok-ident    { color: #89b4fa; }
        .tok-number   { color: #fab387; }
        .tok-op       { color: #f38ba8; }
        .tok-sep      { color: #a6e3a1; }

        /* P-Code 表 */
        .pcode-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .pcode-table th {
            background: #313244;
            padding: 4px 8px;
            color: #f9e2af;
            text-align: left;
            position: sticky;
            top: 0;
        }
        .pcode-table td {
            padding: 3px 8px;
            border-bottom: 1px solid #313244;
        }
        .pcode-table tr.highlight td { background: #45475a; }
        .pcode-table tr:hover td { background: #313244; }
        .addr { color: #6c7086; }
        .opcode { color: #f9e2af; font-weight: bold; }
        .operand { color: #fab387; }

        /* 输出面板 */
        #outputArea {
            font-size: 13px;
            line-height: 1.7;
            white-space: pre-wrap;
            color: #a6e3a1;
        }
        #outputArea .err { color: #f38ba8; }

        /* 语法树 */
        #astArea {
            font-size: 12px;
            line-height: 1.8;
            white-space: pre;
            color: #cdd6f4;
        }

        /* 单步控制栏 */
        .step-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 4px 0 8px 0;
            flex-shrink: 0;
        }
        .step-info {
            font-size: 12px;
            color: #6c7086;
        }

        /* 内存栈帧 */
        #memoryArea {
            font-size: 11px;
            line-height: 1.6;
        }
        .stack-frame {
            background: #1a1b26;
            border: 1px solid #313244;
            border-radius: 6px;
            margin-bottom: 8px;
            overflow: hidden;
        }
        .stack-frame.current {
            border-color: #cba6f7;
            box-shadow: 0 0 8px rgba(203,166,247,0.15);
        }
        .frame-header {
            background: #252636;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            color: #89b4fa;
            font-weight: bold;
            border-bottom: 1px solid #313244;
        }
        .stack-frame.current .frame-header {
            background: #2a2538;
            color: #cba6f7;
        }
        .frame-badge {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 3px;
            background: #313244;
            color: #6c7086;
        }
        .stack-frame.current .frame-badge {
            background: #45475a;
            color: #cba6f7;
        }
        .frame-body { padding: 4px 10px 6px 10px; }
        .frame-row {
            display: flex;
            gap: 8px;
            padding: 2px 6px;
            border-radius: 2px;
        }
        .frame-row:hover { background: #252636; }
        .frame-row.link { border-left: 2px solid #45475a; margin-left: 8px; }
        .frame-slot  { color: #6c7086; width: 40px; flex-shrink: 0; }
        .frame-label { color: #89b4fa; width: 55px; flex-shrink: 0; font-weight: bold; }
        .frame-label.sl { color: #f9e2af; }
        .frame-label.dl { color: #f5c2e7; }
        .frame-label.ra { color: #89b4fa; }
        .frame-value { color: #a6e3a1; font-family: monospace; word-break: break-all; }
        .frame-value.set  { color: #fab387; }

        /* 输入弹窗 */
        #inputOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        #inputOverlay.show { display: flex; }
        #inputDialog {
            background: #313244;
            border-radius: 8px;
            padding: 24px;
            min-width: 300px;
            border: 1px solid #45475a;
        }
        #inputDialog h3 { color: #cba6f7; margin-bottom: 12px; }
        #inputDialog input {
            width: 100%;
            padding: 8px;
            background: #1e1e2e;
            border: 1px solid #45475a;
            color: #cdd6f4;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 12px;
        }
        #inputDialog input:focus { outline: 2px solid #89b4fa; }
        .dialog-btns { display: flex; gap: 8px; justify-content: flex-end; }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #181825; }
        ::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }
    </style>
</head>
<body>

<header>
    <h1>🔵 L26 编译器可视化</h1>
    <span>Coco/R 实现 · 第三组 · 词法 → 语法 → P-Code → 虚拟机</span>
</header>

<!-- 控制栏 -->
<div class="layout">
    <div class="controls">
        <button class="btn btn-primary" onclick="runCompile()">▶ 编译 + 执行</button>
        <button class="btn btn-green"  onclick="runCompileOnly()">⚙ 仅编译</button>
        <button class="btn btn-yellow" onclick="startStep()">⏭ 开始单步</button>
        <button class="btn btn-purple" id="stepBtn" onclick="stepOnce()" disabled>→ 单步执行</button>
        <button class="btn btn-gray"   onclick="loadExample(0)">示例1</button>
        <button class="btn btn-gray"   onclick="loadExample(1)">示例2</button>
        <button class="btn btn-gray"   onclick="loadExample(2)">示例3</button>
        <button class="btn btn-red"    onclick="clearAll()">✖ 清空</button>
        <div class="status-bar"><span id="statusMsg">就绪</span></div>
    </div>

    <!-- 第二行：源代码 | 输出 | 内存栈 -->
    <div class="panel">
        <div class="panel-title"><span class="dot"></span>源代码 (L26)</div>
        <div class="panel-body" style="padding:0;">
            <textarea id="sourceCode" spellcheck="false" placeholder="// 在此输入 L26 源程序&#10;{&#10;    int x;&#10;    x = 42;&#10;    write x;&#10;}"></textarea>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title"><span class="dot" style="background:#a6e3a1;"></span>程序输出</div>
        <div class="panel-body">
            <div id="outputArea">（编译并执行后显示结果）</div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title"><span class="dot" style="background:#cba6f7;"></span>内存栈（Stack Frames）</div>
        <div class="panel-body" id="memoryBody">
            <div id="memoryArea">（单步执行时显示各帧）</div>
        </div>
    </div>

    <!-- 第三行：P-Code | Token（各占一半，min-height:0 防撑开） -->
    <div style="grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:10px;min-height:0;overflow:hidden">
        <div class="panel">
            <div class="panel-title"><span class="dot" style="background:#f9e2af;"></span>P-Code 指令序列</div>
            <div class="step-controls" style="padding:0 14px;flex-shrink:0;">
                <span class="step-info" id="stepInfo">PC: —</span>
                <span class="step-info" id="stackInfo">栈: []</span>
            </div>
            <div class="panel-body">
                <table class="pcode-table" id="pcodeTable">
                    <thead><tr><th>地址</th><th>操作码</th><th>操作数</th><th>备注</th></tr></thead>
                    <tbody id="pcodeBody"></tbody>
                </table>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title"><span class="dot" style="background:#fab387;"></span>Token 列表（词法分析）</div>
            <div class="panel-body">
                <table class="token-table" id="tokenTable">
                    <thead><tr><th>#</th><th>类型</th><th>值</th><th>行</th><th>列</th></tr></thead>
                    <tbody id="tokenBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 输入弹窗（模拟 read 语句） -->
<div id="inputOverlay">
    <div id="inputDialog">
        <h3>📥 程序需要输入</h3>
        <p id="inputPrompt" style="margin-bottom:10px;color:#cdd6f4;font-size:13px;">请输入变量值：</p>
        <input type="number" id="inputVal" placeholder="输入整数..." />
        <div class="dialog-btns">
            <button class="btn btn-primary" onclick="submitInput()">确认</button>
        </div>
    </div>
</div>

<script>
/* ====================================================
   L26 前端（词法/语法分析由 C++ 后端完成，前端只负责 UI + VM 单步）
   后端通过 server.js 桥接调用 l26compiler.exe --json
   F 码和 OPR 码与后端 PCode.h / VM.h 完全对齐
==================================================== */

/* ---- 后端地址 ---- */
const BACKEND = 'http://localhost:8765/compile';

/* ---- 示例程序 ---- */
const EXAMPLES = [
`{
    int val;
    set s;
    s = {1, 2, 3};
    read val;
    if (val in s) {
        add s 10;
        write val;
    }
    while (val > 0) {
        val = val - 1;
        write val;
    }
    write 999;
}`,
`{
    int x;
    set s;
    x = 10;
    s = {1, 2};
    {
        set x;
        x = {5, 6};
        add x 7;
        write x;
        write s;
    }
    write x;
}`,
`{
    int a;
    int b;
    set s1;
    set s2;
    set s3;
    bool flag;

    a = 5;
    b = 3;
    s1 = {1, 2, 3, 4, 5};
    s2 = {3, 4, 5, 6, 7};

    s3 = s1 union s2;
    write s3;

    s3 = s1 inter s2;
    write s3;

    remove s1 3;
    write s1;

    flag = isempty(s1);
    write flag;

    if ((a > b) && (a != 0)) {
        write a;
    }
}`
];

function loadExample(n) {
    document.getElementById('sourceCode').value = EXAMPLES[n];
    clearAll(true);
    setStatus('已加载示例 ' + (n+1), false);
}

function clearAll(keepSrc) {
    if (!keepSrc) document.getElementById('sourceCode').value = '';
    document.getElementById('tokenBody').innerHTML = '';
    document.getElementById('pcodeBody').innerHTML = '';
    document.getElementById('outputArea').textContent = '（编译并执行后显示结果）';
    document.getElementById('memoryArea').textContent = '（单步执行时显示各帧变量）';
    document.getElementById('stepInfo').textContent = 'PC: —';
    document.getElementById('stackInfo').textContent = '栈: []';
    document.getElementById('stepBtn').disabled = true;
    vmState = null;
    setStatus('就绪', false);
}

function setStatus(msg, isErr) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = isErr ? 'error' : '';
}

/* ==================================================
   P-Code 指令码（与后端 PCode.h fct 枚举对齐）
   F: 0=LIT 1=OPR 2=LOD 3=STO 4=CAL 5=INT 6=JMP 7=JPC
================================================== */
const F = { LIT:0, OPR:1, LOD:2, STO:3, CAL:4, INT:5, JMP:6, JPC:7 };
const F_NAME = ['LIT','OPR','LOD','STO','CAL','INT','JMP','JPC'];

/* OPR 子码（与后端 PCode.h OprCode 枚举完全对齐） */
const OPR = {
    RET:0, NEG:1, ADD:2, SUB:3, MUL:4, DIV:5, ODD:6,
    EQ:8, NE:9, LT:10, GE:11, GT:12, LE:13,
    WRITE:14, WRITELN:15, READ:16,
    AND:18, OR:19, NOT:20,
    SET_MK:201, SET_UNION:202, SET_INTER:203,
    SET_IN:204, SET_ISEMPTY:205, SET_ADD:206, SET_REMOVE:207,
    SET_EQ:208, WRITE_BOOL:209, WRITE_SET:210, SET_NE:211
};

const OPR_NAME = {};
for (const [k,v] of Object.entries(OPR)) OPR_NAME[v] = k;

/* ==================================================
   虚拟机（VM）—— 与后端 VM.h 行为对齐
   P-Code 由后端生成，前端 VM 负责执行 + 单步调试
================================================== */
class VM {
    constructor(code) {
        this.code = code;
        this.s = new Array(2048).fill(0);
        this.setPool = {};
        this.p = 0; this.b = 0; this.t = -1;
        this.halted = false;
        this.output = [];
    }

    base(l, b) { while (l > 0) { b = this.s[b]; l--; } return b; }
    push(v) { this.s[++this.t] = v; }
    pop() { return this.s[this.t--]; }

    pushSet(set) { this.t++; this.s[this.t] = 1; this.setPool[this.t] = set; }
    popSet() { const s = this.setPool[this.t] || new Set(); delete this.setPool[this.t]; this.t--; return s; }

    setStr(s) { return '{' + [...s].sort((a,b)=>a-b).join(', ') + '}'; }

    async stepAsync() {
        if (this.halted || this.p >= this.code.length) { this.halted = true; return false; }
        const ins = this.code[this.p++];
        switch (ins.f) {
        case F.LIT: this.push(ins.a); break;
        case F.OPR: return this.execOPR(ins);
        case F.LOD: {
            const addr = this.base(ins.l, this.b) + ins.a;
            if (this.setPool[addr] !== undefined)
                this.pushSet(new Set(this.setPool[addr]));
            else
                this.push(this.s[addr]);
            break;
        }
        case F.STO: {
            const addr = this.base(ins.l, this.b) + ins.a;
            if (this.setPool[this.t] !== undefined) {
                this.setPool[addr] = this.popSet();
                this.s[addr] = 1;
            } else {
                this.s[addr] = this.pop();
                delete this.setPool[addr];
            }
            break;
        }
        case F.INT: this.t += ins.a; break;
        case F.JMP: this.p = ins.a; break;
        case F.JPC: { if (!this.pop()) this.p = ins.a; break; }
        case F.CAL:
            this.s[this.t+1] = this.base(ins.l, this.b);
            this.s[this.t+2] = this.b;
            this.s[this.t+3] = this.p;
            this.b = this.t+1; this.p = ins.a;
            break;
        }
        return false;
    }

    execOPR(ins) {
        const a = ins.a;
        switch (a) {
        case OPR.RET:
            this.t = this.b - 1;
            this.p = this.s[this.b+2];
            this.b = this.s[this.b+1];
            if (this.p === 0) this.halted = true;
            break;
        case OPR.NEG: this.s[this.t] = -this.s[this.t]; break;
        case OPR.ADD: { const b=this.pop(); this.s[this.t] += b; break; }
        case OPR.SUB: { const b=this.pop(); this.s[this.t] -= b; break; }
        case OPR.MUL: { const b=this.pop(); this.s[this.t] *= b; break; }
        case OPR.DIV: {
            const b=this.pop();
            if (b===0) { this.output.push('[错误]除以零'); this.halted=true; break; }
            this.s[this.t] = Math.trunc(this.s[this.t] / b); break;
        }
        case OPR.ODD:  this.s[this.t] = this.s[this.t] & 1; break;
        case OPR.EQ:   { const b=this.pop(); this.s[this.t]=(this.s[this.t]===b)?1:0; break; }
        case OPR.NE:   { const b=this.pop(); this.s[this.t]=(this.s[this.t]!==b)?1:0; break; }
        case OPR.LT:   { const b=this.pop(); this.s[this.t]=(this.s[this.t]< b)?1:0; break; }
        case OPR.GE:   { const b=this.pop(); this.s[this.t]=(this.s[this.t]>=b)?1:0; break; }
        case OPR.GT:   { const b=this.pop(); this.s[this.t]=(this.s[this.t]> b)?1:0; break; }
        case OPR.LE:   { const b=this.pop(); this.s[this.t]=(this.s[this.t]<=b)?1:0; break; }
        case OPR.WRITE: this.output.push(String(this.pop())); break;
        case OPR.WRITELN: this.output.push(''); break;
        case OPR.READ: return true; /* 需要用户输入 */
        case OPR.AND:  { const b=this.pop(); this.s[this.t]=(this.s[this.t]&&b)?1:0; break; }
        case OPR.OR:   { const b=this.pop(); this.s[this.t]=(this.s[this.t]||b)?1:0; break; }
        case OPR.NOT:  this.s[this.t] = this.s[this.t]?0:1; break;
        case OPR.SET_MK: {
            const cnt = ins.l || 0;
            const elems = [];
            for (let i=0; i<cnt; i++) elems.push(this.pop());
            this.pushSet(new Set(elems));
            break;
        }
        case OPR.SET_UNION: {
            const sb=this.popSet(), sa=this.popSet();
            this.pushSet(new Set([...sa, ...sb]));
            break;
        }
        case OPR.SET_INTER: {
            const sb=this.popSet(), sa=this.popSet();
            this.pushSet(new Set([...sa].filter(x=>sb.has(x))));
            break;
        }
        case OPR.SET_IN: {
            const s2=this.popSet(), elem=this.pop();
            this.push(s2.has(elem)?1:0);
            break;
        }
        case OPR.SET_ISEMPTY: this.push(this.popSet().size===0?1:0); break;
        case OPR.SET_ADD: {
            const s2=this.popSet(), elem=this.pop();
            s2.add(elem); this.pushSet(s2);
            break;
        }
        case OPR.SET_REMOVE: {
            const s2=this.popSet(), elem=this.pop();
            s2.delete(elem); this.pushSet(s2);
            break;
        }
        case OPR.SET_EQ: {
            const sb=this.popSet(), sa=this.popSet();
            this.push(sa.size===sb.size && [...sa].every(x=>sb.has(x))?1:0);
            break;
        }
        case OPR.WRITE_BOOL: this.output.push(this.pop()?'true':'false'); break;
        case OPR.WRITE_SET:  this.output.push(this.setStr(this.popSet())); break;
        case OPR.SET_NE: {
            const sb=this.popSet(), sa=this.popSet();
            this.push(sa.size!==sb.size || ![...sa].every(x=>sb.has(x))?1:0);
            break;
        }
        default: this.output.push('[未知OPR '+a+']'); this.halted=true;
        }
        return false;
    }
}

/* ==================================================
   全局状态
================================================== */
let compiledCode = [];
let allTokens = [];
let compileHadErrors = false;
let savedErrors = [];
let shownErrors = new Set();
let vmState = null;

/* ==================================================
   调用 C++ 后端编译（通过 server.js 桥接）
================================================== */
async function doCompile(src) {
    try {
        const resp = await fetch(BACKEND, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ source: src })
        });
        const data = await resp.json();

        /* 先取 Token 和 P-Code（有错误时后端也返回） */
        allTokens = data.tokens || [];
        renderTokens(allTokens);
        compiledCode = data.pcode || [];
        renderPCode(compiledCode);

        /* 错误展示 */
        savedErrors = data.errors || [];
        if (savedErrors.length > 0) {
            compileHadErrors = true;
            setStatus('编译错误：' + savedErrors[0].msg, true);
            document.getElementById('outputArea').innerHTML =
                savedErrors.map(e => `<span class="err">行${e.line}列${e.col}: ${escHtml(e.msg)}</span>`).join('\n');
            return compiledCode.length > 0;  /* 有 P-Code 仍可单步 */
        }

        compileHadErrors = false;
        setStatus(`编译成功 — ${compiledCode.length} 条指令，${allTokens.length} 个 Token`, false);
        return true;
    } catch (e) {
        setStatus('连接后端失败！请先启动 server.js', true);
        document.getElementById('outputArea').textContent =
            '无法连接到 ' + BACKEND + '\n请在 Compiler 目录下运行: node server.js';
        return false;
    }
}

function runCompileOnly() {
    const src = document.getElementById('sourceCode').value;
    if (!src.trim()) { setStatus('请输入源程序', true); return; }
    document.getElementById('outputArea').textContent = '';
    document.getElementById('stepBtn').disabled = true;
    doCompile(src);
}

async function runCompile() {
    const src = document.getElementById('sourceCode').value;
    if (!src.trim()) { setStatus('请输入源程序', true); return; }
    document.getElementById('outputArea').textContent = '';
    const ok = await doCompile(src);
    if (!ok || !compiledCode.length) return;
    if (compileHadErrors) { setStatus('有编译错误，已中止执行', true); return; }

    vmState = new VM(compiledCode);
    setStatus('执行中…', false);
    await runVM(vmState, false);
    renderOutput(vmState.output);
    setStatus(`执行完毕 — 共 ${vmState.output.length} 行输出`, false);
}

async function runVM(vm, stepMode) {
    while (!vm.halted) {
        const needInput = await vm.stepAsync();
        if (needInput) {
            const val = await promptInput('整数');
            vm.push(parseInt(val) || 0);
        }
        if (stepMode) break;
    }
}

/* 单步模式（有编译错误也允许单步，方便定位问题） */
async function startStep() {
    const src = document.getElementById('sourceCode').value;
    if (!src.trim()) { setStatus('请输入源程序', true); return; }
    document.getElementById('outputArea').textContent = '';
    const ok = await doCompile(src);
    if (!compiledCode.length) {
        setStatus('无 P-Code 可执行', true); return;
    }
    vmState = new VM(compiledCode);
    shownErrors.clear();
    document.getElementById('stepBtn').disabled = false;
    highlightPCode(-1);
    updateStepInfo(vmState);
    if (compileHadErrors) {
        document.getElementById('outputArea').innerHTML =
            '<span style="color:#f9e2af;">⚠ 编译时有错误，单步至对应行时将显示</span>';
        setStatus('有编译错误，可单步查看', true);
    } else {
        setStatus('单步模式就绪，点击 → 单步执行', false);
    }
}

async function stepOnce() {
    if (!vmState || vmState.halted) {
        setStatus('程序已执行完毕', false);
        document.getElementById('stepBtn').disabled = true;
        return;
    }
    const prevPc = vmState.p;
    const needInput = await vmState.stepAsync();
    if (needInput) {
        const val = await promptInput('整数');
        vmState.push(parseInt(val) || 0);
    }
    highlightPCode(prevPc);
    updateStepInfo(vmState);
    renderOutput(vmState.output);
    renderMemory(vmState);
    /* 检查当前指令是否落在某错误行上（每个错误只显示一次） */
    if (compileHadErrors && prevPc >= 0 && prevPc < compiledCode.length) {
        const insLine = compiledCode[prevPc].line || 0;
        const matched = savedErrors.filter((e, i) => {
            const key = e.line + ':' + e.msg;
            return e.line === insLine && !shownErrors.has(key);
        });
        if (matched.length > 0) {
            matched.forEach(e => shownErrors.add(e.line + ':' + e.msg));
            const out = document.getElementById('outputArea');
            out.innerHTML += '\n<span style="color:#f38ba8;">▶ 错误行 ' + insLine + '</span>\n' +
                matched.map(e => '⚠ ' + escHtml(e.msg)).join('\n');
        }
    }
    if (vmState.halted) {
        setStatus('执行完毕', false);
        document.getElementById('stepBtn').disabled = true;
    }
}

/* ==================================================
   渲染函数
================================================== */
function renderTokens(tokens) {
    const tbody = document.getElementById('tokenBody');
    tbody.innerHTML = '';
    tokens.forEach((tok, idx) => {
        let cls = 'tok-op';
        if (['int','bool','set','if','else','while','write','read','add','remove','true','false','in','isempty','union','inter'].includes(tok.type)) cls = 'tok-keyword';
        else if (tok.type === 'ident') cls = 'tok-ident';
        else if (tok.type === 'number') cls = 'tok-number';
        else if ([';',',','(',')','{','}'].includes(tok.type)) cls = 'tok-sep';
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${idx}</td><td class="${cls}">${escHtml(tok.type)}</td><td>${escHtml(tok.val)}</td><td>${tok.line}</td><td>${tok.col}</td>`;
        tbody.appendChild(tr);
    });
}

function renderPCode(code) {
    const tbody = document.getElementById('pcodeBody');
    tbody.innerHTML = '';
    for (let i = 0; i < code.length; i++) {
        const ins = code[i];
        let operand = `${ins.l}  ${ins.a}`;
        const notes = getPCodeNote(ins);
        const tr = document.createElement('tr');
        tr.id = 'pc_' + i;
        tr.innerHTML = `<td class="addr">(${i})</td><td class="opcode">${F_NAME[ins.f]||'?'}</td><td class="operand">${operand}</td><td style="color:#6c7086;font-size:11px;">${notes}</td>`;
        tbody.appendChild(tr);
    }
}

function getPCodeNote(ins) {
    if (ins.f === F.LIT) return `压入常数 ${ins.a}`;
    if (ins.f === F.INT) return `分配 ${ins.a} 个栈槽`;
    if (ins.f === F.JMP) return `无条件跳转 → ${ins.a}`;
    if (ins.f === F.JPC) return `假则跳转 → ${ins.a}`;
    if (ins.f === F.LOD) return `加载变量 [${ins.l},${ins.a}]`;
    if (ins.f === F.STO) return `存入变量 [${ins.l},${ins.a}]`;
    if (ins.f === F.OPR) {
        const n = OPR_NAME[ins.a] || String(ins.a);
        const notes = {
            RET:'返回', NEG:'取负', ADD:'加', SUB:'减', MUL:'乘', DIV:'除', ODD:'奇测',
            EQ:'==', NE:'!=', LT:'<', GE:'>=', GT:'>', LE:'<=',
            WRITE:'写整数', WRITELN:'换行', READ:'读输入',
            AND:'与', OR:'或', NOT:'非',
            SET_MK:'构造集合', SET_UNION:'并集', SET_INTER:'交集',
            SET_IN:'成员测试', SET_ISEMPTY:'空集测试', SET_ADD:'集合添加', SET_REMOVE:'集合删除',
            SET_EQ:'集合相等', WRITE_BOOL:'写布尔', WRITE_SET:'写集合', SET_NE:'集合不等'
        };
        return `OPR.${n}：${notes[n]||''}`;
    }
    return '';
}

function highlightPCode(pc) {
    document.querySelectorAll('#pcodeBody tr').forEach(tr => tr.classList.remove('highlight'));
    if (pc >= 0) {
        const el = document.getElementById('pc_' + pc);
        if (el) { el.classList.add('highlight'); el.scrollIntoView({block:'nearest'}); }
    }
}

function updateStepInfo(vm) {
    document.getElementById('stepInfo').textContent = `PC: ${vm.p}  b: ${vm.b}  t: ${vm.t}`;
    const items = [];
    for (let i = Math.max(0, vm.t - 5); i <= vm.t; i++) {
        if (vm.setPool[i] !== undefined)
            items.push('{' + [...vm.setPool[i]].sort((a,b)=>a-b).join(',') + '}');
        else
            items.push(String(vm.s[i]));
    }
    document.getElementById('stackInfo').textContent = `栈顶: [${items.join(', ')}]`;
}

function renderOutput(output) {
    const el = document.getElementById('outputArea');
    if (output.length === 0) { el.textContent = '（无输出）'; return; }
    el.textContent = output.join('\n');
}

function renderMemory(vm) {
    const el = document.getElementById('memoryArea');
    if (vm.t < 0) { el.innerHTML = '<div style="color:#6c7086;font-size:12px;">（栈为空）</div>'; return; }

    /* 从当前 b 沿静态链向上，收集所有帧 */
    const frames = [];
    let curB = vm.b;
    while (true) {
        const prevB = vm.s[curB];
        frames.push(curB);
        if (prevB === 0 || prevB >= curB) break; /* 到达最外层或异常 */
        curB = prevB;
    }

    /* 从外到内渲染（frames 是内到外，反转） */
    frames.reverse();
    let html = '';
    const lastIdx = frames.length - 1;

    for (let fi = 0; fi < frames.length; fi++) {
        const fb = frames[fi];
        const isCurrent = (fi === lastIdx);
        /* 帧范围：[fb, nextB-1] 或 [fb, t] */
        const nextB = (fi < lastIdx) ? frames[fi+1] : (vm.t + 1);
        const sl = vm.s[fb];
        const dl = vm.s[fb+1];
        const ra = vm.s[fb+2];

        html += `<div class="stack-frame${isCurrent ? ' current' : ''}">`;
        html += `<div class="frame-header">`;
        html += `<span>Level ${fi} — b=${fb}</span>`;
        html += `<span class="frame-badge">${isCurrent ? '● 当前帧' : '外层帧'}</span>`;
        html += `</div>`;

        html += `<div class="frame-body">`;
        /* 联系单元 */
        html += `<div class="frame-row link"><span class="frame-slot">s[${fb}]</span><span class="frame-label sl">SL</span><span class="frame-value">link → ${sl}</span></div>`;
        html += `<div class="frame-row link"><span class="frame-slot">s[${fb+1}]</span><span class="frame-label dl">DL</span><span class="frame-value">link → ${dl}</span></div>`;
        html += `<div class="frame-row link"><span class="frame-slot">s[${fb+2}]</span><span class="frame-label ra">RA</span><span class="frame-value">addr ${ra}</span></div>`;

        /* 局部变量 */
        let varIdx = 0;
        for (let i = fb + 3; i < nextB; i++) {
            let valStr, setClass = '';
            if (vm.setPool[i] !== undefined) {
                valStr = '{' + [...vm.setPool[i]].sort((a,b)=>a-b).join(', ') + '}';
                setClass = ' set';
            } else {
                valStr = String(vm.s[i]);
            }
            html += `<div class="frame-row"><span class="frame-slot">s[${i}]</span><span class="frame-label">var${varIdx}</span><span class="frame-value${setClass}">${escHtml(valStr)}</span></div>`;
            varIdx++;
        }
        if (fb + 3 >= nextB) {
            html += `<div style="color:#6c7086;font-size:10px;padding:2px 8px;">（无局部变量）</div>`;
        }
        html += `</div></div>`;
    }

    /* 栈底到第一个帧之间是全局区 */
    const globalEnd = frames[0] || 0;
    if (globalEnd > 0) {
        html = `<div class="stack-frame"><div class="frame-header"><span>全局区 s[0..${globalEnd-1}]</span><span class="frame-badge">系统区</span></div><div class="frame-body">` +
            `<div class="frame-row"><span class="frame-slot">s[0]</span><span class="frame-label sl">SL</span><span class="frame-value">${vm.s[0]}</span></div>` +
            `<div class="frame-row"><span class="frame-slot">s[1]</span><span class="frame-label dl">DL</span><span class="frame-value">${vm.s[1]}</span></div>` +
            `<div class="frame-row"><span class="frame-slot">s[2]</span><span class="frame-label ra">RA</span><span class="frame-value">${vm.s[2]}</span></div>` +
            `</div></div>` + html;
    }

    el.innerHTML = html;
}

/* 输入弹窗 */
let inputResolve = null;
function promptInput(hint) {
    return new Promise(resolve => {
        inputResolve = resolve;
        document.getElementById('inputPrompt').textContent = '程序执行到 read 语句，请输入整数值：';
        document.getElementById('inputVal').value = '';
        document.getElementById('inputOverlay').classList.add('show');
        document.getElementById('inputVal').focus();
    });
}
function submitInput() {
    const val = document.getElementById('inputVal').value.trim();
    document.getElementById('inputOverlay').classList.remove('show');
    if (inputResolve) { inputResolve(val); inputResolve = null; }
}
document.getElementById('inputVal').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitInput();
});

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

</script>
